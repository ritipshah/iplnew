<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-900 flex items-center justify-center min-h-screen text-white">

<div class="bg-gray-800 p-10 rounded-xl shadow-lg w-96 text-center">

<h2 class="text-3xl font-bold mb-6">
Create Account
</h2>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required
class="w-full p-2 mb-4 rounded text-black"
/>

<input
type="password"
name="password"
placeholder="Password"
required
class="w-full p-2 mb-4 rounded text-black"
/>

<button class="bg-green-500 w-full py-2 rounded hover:bg-green-600">
Register
</button>

</form>

<br>

<a href="/">

<button class="bg-blue-500 px-4 py-2 rounded hover:bg-blue-600">
Back to Login
</button>

</a>

</div>

</body>
</html>
